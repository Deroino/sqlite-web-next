name: Build Container
on:
  push:
    branches:
      - master
    tags:
      - '*'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Determine image tag
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "image_tag=ghcr.io/${OWNER}/sqlite-web-next:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=ghcr.io/${OWNER}/sqlite-web-next:latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Build image
        run: docker build -t ${{ steps.meta.outputs.image_tag }} -f docker/Dockerfile .
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: docker push ${{ steps.meta.outputs.image_tag }}
