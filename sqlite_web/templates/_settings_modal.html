<!-- Settings Modal -->
<div class="modal fade" id="settingsModal" tabindex="-1" role="dialog" aria-labelledby="settingsModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="settingsModalLabel">Settings</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form id="settings-form">
          <div class="form-group">
            <label for="setting-title">Application Title</label>
            <input type="text" class="form-control" id="setting-title" name="title" placeholder="sqlite-web">
          </div>
          <div class="form-group">
            <div class="custom-control custom-switch">
              <input type="checkbox" class="custom-control-input" id="setting-safe-query" name="safe_query" value="true">
              <label class="custom-control-label" for="setting-safe-query">Safe Query (auto-append LIMIT 50)</label>
            </div>
            <small class="form-text text-muted">When enabled, queries without a LIMIT clause will automatically have LIMIT 50 appended.</small>
          </div>
          <hr>
          <h6>AI Service Configuration</h6>
          <div class="form-group">
            <label for="setting-ai-url">API URL</label>
            <input type="url" class="form-control" id="setting-ai-url" name="ai_url" placeholder="https://api.openai.com/v1/chat/completions">
          </div>
          <div class="form-group">
            <label for="setting-ai-model">Model Name</label>
            <input type="text" class="form-control" id="setting-ai-model" name="ai_model" placeholder="gpt-4">
          </div>
          <div class="form-group">
            <label for="setting-ai-key">API Key</label>
            <input type="password" class="form-control" id="setting-ai-key" name="ai_api_key" placeholder="sk-...">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="settings-save-btn">Save</button>
      </div>
    </div>
  </div>
</div>
