<!-- AI Chat Modal -->
<div class="modal fade" id="aiChatModal" tabindex="-1" role="dialog" aria-labelledby="aiChatModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="aiChatModalLabel">AI Query Assistant</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <p class="text-muted small">Describe what you want to query. Use <code>@table_name</code> to include table schema as context.</p>
        <div class="form-group">
          <textarea class="form-control" id="ai-chat-input" rows="3" placeholder="e.g., Show me all users who signed up this month @users"></textarea>
        </div>
        <div id="ai-chat-loading" style="display:none;" class="text-center py-3">
          <div class="spinner-border spinner-border-sm text-primary" role="status">
            <span class="sr-only">Loading...</span>
          </div>
          <span class="ml-2">Generating query...</span>
        </div>
        <div id="ai-chat-result" style="display:none;"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" id="ai-chat-send">Generate Query</button>
        <button type="button" class="btn btn-success" id="ai-use-query" style="display:none;">Use This Query</button>
      </div>
    </div>
  </div>
</div>
